<!DOCTYPE html>
<html lang="zh-CN" data-lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="pageTitle">排行榜 — SkillTrends</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0d1117; --bg-surface: #161b22; --bg-surface-2: #1c2128;
  --border: #30363d; --border-light: #484f58;
  --text-primary: #f0f6fc; --text-secondary: #8b949e; --text-muted: #6e7681;
  --accent-blue: #58a6ff; --accent-gold: #e3b341; --accent-orange: #f78166;
  --accent-green: #3fb950; --accent-red: #f85149; --accent-purple: #a371f7;
  --font-mono: 'Consolas', 'Courier New', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

body {
  font-family: var(--font-sans); background: var(--bg-primary);
  color: var(--text-primary); min-height: 100vh; line-height: 1.5;
}

/* Nav */
.top-nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(22,27,34,0.95); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px;
  display: flex; align-items: center; gap: 24px;
}
.nav-logo {
  font-size: 20px; font-weight: 700; text-decoration: none; display: flex; align-items: center; gap: 8px;
  color: var(--text-primary);
}
.nav-logo svg { width: 28px; height: 28px; }
.nav-links { display: flex; gap: 4px; margin-left: auto; align-items: center; }
.nav-link {
  padding: 6px 14px; border-radius: 6px; font-size: 14px; font-weight: 500;
  color: var(--text-secondary); text-decoration: none; transition: all 0.2s;
}
.nav-link:hover, .nav-link.active { color: var(--text-primary); background: var(--bg-surface-2); }
.lang-switch { display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-left: 8px; }
.lang-btn {
  padding: 5px 10px; font-size: 12px; font-weight: 600; cursor: pointer;
  background: transparent; color: var(--text-secondary); border: none;
  font-family: var(--font-sans); transition: all 0.15s;
}
.lang-btn:hover { color: var(--text-primary); }
.lang-btn.active { background: var(--accent-blue); color: #fff; }
.lang-btn + .lang-btn { border-left: 1px solid var(--border); }

/* Container */
.container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

/* Page Header */
.page-header { padding: 32px 0 24px; }
.page-title { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
.page-sub { font-size: 14px; color: var(--text-muted); }

/* Filters */
.filters {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px; margin-bottom: 20px;
  display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
}
.filter-group { display: flex; align-items: center; gap: 6px; }
.filter-label { font-size: 12px; color: var(--text-muted); }
.filter-input, .filter-select {
  padding: 8px 12px; font-size: 13px; background: var(--bg-primary);
  border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary);
  font-family: var(--font-sans); min-width: 140px;
}
.filter-input:focus, .filter-select:focus { outline: none; border-color: var(--accent-blue); }
.filter-input { flex: 1; min-width: 220px; }
.result-count { font-size: 13px; color: var(--text-secondary); margin-left: auto; font-family: var(--font-mono); }
.result-count strong { color: var(--accent-blue); }

/* Tabs */
.trend-tabs { display: flex; gap: 4px; padding: 4px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; }
.trend-tab {
  padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
  background: transparent; border: none; color: var(--text-secondary);
  border-radius: 6px; font-family: var(--font-sans); transition: all 0.2s;
}
.trend-tab:hover { color: var(--text-primary); }
.trend-tab.active { background: var(--bg-surface-2); color: var(--text-primary); }
.trend-tab.stars.active { box-shadow: inset 0 0 0 1px var(--accent-gold); color: var(--accent-gold); }
.trend-tab.downloads.active { box-shadow: inset 0 0 0 1px var(--accent-blue); color: var(--accent-blue); }
.trend-tab.rising.active { box-shadow: inset 0 0 0 1px var(--accent-orange); color: var(--accent-orange); }

/* Table */
.ranking-table {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}
.ranking-row {
  display: grid; grid-template-columns: 50px 1fr 90px 90px 100px 60px;
  align-items: center; padding: 14px 18px; gap: 12px;
  border-bottom: 1px solid var(--border); text-decoration: none; color: inherit;
  transition: background 0.15s;
}
.ranking-row:hover { background: var(--bg-surface-2); }
.ranking-row:last-child { border-bottom: none; }
.ranking-row.header {
  background: var(--bg-surface-2); font-size: 11px; font-weight: 600;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;
  padding: 10px 18px; position: sticky; top: 56px;
}
.ranking-row.header:hover { background: var(--bg-surface-2); }
.col-rank { font-family: var(--font-mono); font-size: 14px; font-weight: 700; color: var(--text-muted); text-align: center; }
.col-name { min-width: 0; }
.col-name-main { font-size: 14px; font-weight: 600; color: var(--accent-blue); margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.col-name-desc { font-size: 12px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.col-stars, .col-forks, .col-growth { font-family: var(--font-mono); font-size: 13px; }
.col-stars { color: var(--accent-gold); }
.col-forks { color: var(--accent-blue); }
.col-growth { color: var(--accent-green); }
.col-rank-badge { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; margin: 0 auto; }
.col-rank-badge.gold { background: var(--accent-gold); }
.col-rank-badge.blue { background: var(--accent-blue); }
.col-rank-badge.orange { background: var(--accent-orange); }
.col-rank-badge.dim { background: var(--bg-surface-2); color: var(--text-muted); }

/* Pagination */
.pagination {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 24px 0;
}
.pg-btn {
  min-width: 36px; height: 36px; padding: 0 12px; border-radius: 6px;
  background: var(--bg-surface); border: 1px solid var(--border);
  color: var(--text-secondary); font-size: 13px; font-weight: 500; cursor: pointer;
  font-family: var(--font-sans); transition: all 0.15s;
}
.pg-btn:hover:not(:disabled) { border-color: var(--accent-blue); color: var(--text-primary); }
.pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.pg-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
.pg-info { padding: 0 12px; font-size: 13px; color: var(--text-muted); font-family: var(--font-mono); }

/* Empty / Loading */
.empty-state, .loading-state, .error-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
.error-state .error-msg { color: var(--accent-red); font-size: 13px; margin-top: 6px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

footer { border-top: 1px solid var(--border); padding: 24px; text-align: center; color: var(--text-muted); font-size: 13px; margin-top: 40px; }

@media (max-width: 768px) {
  .ranking-row { grid-template-columns: 40px 1fr 70px 60px; }
  .ranking-row .col-forks, .ranking-row .col-growth { display: none; }
  .ranking-row.header .col-forks, .ranking-row.header .col-growth { display: none; }
  .lang-switch { margin-left: 4px; }
}
</style>
</head>
<body>

<nav class="top-nav">
  <a href="index.html" class="nav-logo">
    <svg viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="#58a6ff"/><path d="M8 14l4 4 8-8" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    SkillTrends
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link" data-i18n="navHome">首页</a>
    <a href="ranking.html" class="nav-link active" data-i18n="navRanking">排行榜</a>
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="zh" onclick="setLang('zh')">中</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <div class="page-title" data-i18n="pageTitle">排行榜</div>
    <div class="page-sub"><span data-i18n="pageSub">浏览全部</span> <span id="totalCount">—</span> <span data-i18n="pageSubSuffix">个技能仓库</span></div>
  </div>

  <div class="filters">
    <input type="text" class="filter-input" id="searchInput" data-i18n-placeholder="searchPlaceholder" placeholder="搜索仓库名、描述、主题...">
    <div class="filter-group">
      <span class="filter-label" data-i18n="labelCat">分类</span>
      <select class="filter-select" id="catFilter"><option value="" data-i18n="allCats">全部分类</option></select>
    </div>
    <div class="filter-group">
      <span class="filter-label" data-i18n="labelLang">语言</span>
      <select class="filter-select" id="langFilter"><option value="" data-i18n="allLangs">全部语言</option></select>
    </div>
    <div class="result-count" id="resultCount"><strong>0</strong> <span data-i18n="results">条结果</span></div>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px;">
    <div class="trend-tabs">
      <button class="trend-tab stars active" data-type="stars" data-i18n="tabStars">Stars 榜</button>
      <button class="trend-tab downloads" data-type="downloads" data-i18n="tabDownloads">下载榜</button>
      <button class="trend-tab rising" data-type="rising" data-i18n="tabRising">上升榜</button>
    </div>
  </div>

  <div class="ranking-table" id="tableContainer">
    <div class="loading-state"><div class="spinner"></div><p data-i18n="loading">加载中...</p></div>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<footer data-i18n="footer">SkillTrends © 2026 · 数据来源 GitHub API</footer>

<script>
// ============================================================
// i18n
// ============================================================
var I18N = {
  zh: {
    pageTitle: '排行榜 — SkillTrends',
    navHome: '首页', navRanking: '排行榜',
    pageSub: '浏览全部', pageSubSuffix: '个技能仓库',
    searchPlaceholder: '搜索仓库名、描述、主题...',
    labelCat: '分类', labelLang: '语言',
    allCats: '全部分类', allLangs: '全部语言',
    results: '条结果', loading: '加载中...', loadFailed: '加载失败',
    tabStars: 'Stars 榜', tabDownloads: '下载榜', tabRising: '上升榜',
    noResults: '没有匹配的技能', tryOther: '试试调整搜索词或筛选条件',
    colRank: '排名', colName: '仓库', colStars: 'Stars', colForks: 'Forks', colGrowth: '日增',
    prev: '上一页', next: '下一页',
    footer: 'SkillTrends © 2026 · 数据来源 GitHub API',
  },
  en: {
    pageTitle: 'Ranking — SkillTrends',
    navHome: 'Home', navRanking: 'Ranking',
    pageSub: 'Browse all', pageSubSuffix: 'skills',
    searchPlaceholder: 'Search repos, descriptions, topics...',
    labelCat: 'Category', labelLang: 'Language',
    allCats: 'All Categories', allLangs: 'All Languages',
    results: 'results', loading: 'Loading...', loadFailed: 'Failed to load',
    tabStars: 'Most Starred', tabDownloads: 'Most Downloaded', tabRising: 'Rising Fast',
    noResults: 'No matching skills', tryOther: 'Try adjusting your search or filters',
    colRank: 'Rank', colName: 'Repository', colStars: 'Stars', colForks: 'Forks', colGrowth: 'Daily',
    prev: 'Prev', next: 'Next',
    footer: 'SkillTrends © 2026 · Data from GitHub API',
  }
};

var currentLang = localStorage.getItem('skilltrends_lang') || 'zh';
var t = function(key) { return I18N[currentLang][key] || key; };

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('skilltrends_lang', lang);
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  document.documentElement.setAttribute('data-lang', lang);
  document.querySelectorAll('.lang-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-lang') === lang);
  });
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.getAttribute('data-i18n');
    if (I18N[lang][key]) el.textContent = I18N[lang][key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
    var key = el.getAttribute('data-i18n-placeholder');
    if (I18N[lang][key]) el.placeholder = I18N[lang][key];
  });
  document.title = I18N[lang].pageTitle;
  // 重新渲染 select 的 options
  if (DATA) renderFilters();
  renderTable();
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.getAttribute('data-i18n');
    if (I18N[currentLang][key]) el.textContent = I18N[currentLang][key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
    var key = el.getAttribute('data-i18n-placeholder');
    if (I18N[currentLang][key]) el.placeholder = I18N[currentLang][key];
  });
  document.querySelectorAll('.lang-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-lang') === currentLang);
  });
  document.title = I18N[currentLang].pageTitle;
}

// ============================================================
// 数据 + 状态
// ============================================================
var DATA = null;
var currentTab = 'stars';
var currentRankings = {};
var filtered = [];
var page = 1;
var perPage = 20;

function fmtStars(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return String(n);
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getParam(name) { return new URLSearchParams(window.location.search).get(name); }

function applyFilters() {
  var q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  var cat = document.getElementById('catFilter').value;
  var lang = document.getElementById('langFilter').value;
  var list = currentRankings[currentTab] || [];
  filtered = list.filter(function(s) {
    if (cat && s.category !== cat) return false;
    if (lang && s.language !== lang) return false;
    if (q) {
      var blob = (s.fullName + ' ' + (s.description || '') + ' ' + (s.topics || []).join(' ')).toLowerCase();
      if (blob.indexOf(q) === -1) return false;
    }
    return true;
  });
  page = 1;
  renderTable();
}

function renderFilters() {
  var catSel = document.getElementById('catFilter');
  var langSel = document.getElementById('langFilter');
  var prevCat = catSel.value;
  var prevLang = langSel.value;

  var cats = [].concat(DATA.categories.map(function(c) { return c.name; })).sort();
  var langs = [].concat(DATA.allSkills.map(function(s) { return s.language; }).filter(Boolean).filter(function(v, i, a) { return a.indexOf(v) === i; })).sort();

  catSel.innerHTML = '<option value="">' + t('allCats') + '</option>' + cats.map(function(c) { return '<option value="' + esc(c) + '">' + esc(c) + '</option>'; }).join('');
  langSel.innerHTML = '<option value="">' + t('allLangs') + '</option>' + langs.map(function(l) { return '<option value="' + esc(l) + '">' + esc(l) + '</option>'; }).join('');

  if (prevCat) catSel.value = prevCat;
  if (prevLang) langSel.value = prevLang;
}

function renderTable() {
  var start = (page - 1) * perPage;
  var slice = filtered.slice(start, start + perPage);
  var colorMap = { stars: 'gold', downloads: 'blue', rising: 'orange' };
  var html = '';

  html += '<a class="ranking-row header">' +
    '<div class="col-rank">#</div>' +
    '<div class="col-name">' + t('colName') + '</div>' +
    '<div class="col-stars">' + t('colStars') + '</div>' +
    '<div class="col-forks">' + t('colForks') + '</div>' +
    '<div class="col-growth">' + t('colGrowth') + '</div>' +
    '<div class="col-rank">·</div>' +
  '</a>';

  if (slice.length === 0) {
    html += '<div class="empty-state"><p>' + t('noResults') + '</p><p style="font-size:13px;margin-top:8px;">' + t('tryOther') + '</p></div>';
    document.getElementById('tableContainer').innerHTML = html;
    document.getElementById('resultCount').innerHTML = '<strong>0</strong> ' + t('results');
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  slice.forEach(function(s, i) {
    var rank = start + i + 1;
    var badgeClass = rank <= 3 ? colorMap[currentTab] : 'dim';
    var daily = s.starsPerDay ? '+' + fmtStars(s.starsPerDay) : '—';
    html += '<a class="ranking-row" href="detail.html?id=' + encodeURIComponent(s.fullName) + '">' +
      '<div class="col-rank"><div class="col-rank-badge ' + badgeClass + '">' + rank + '</div></div>' +
      '<div class="col-name">' +
        '<div class="col-name-main">' + esc(s.fullName) + '</div>' +
        '<div class="col-name-desc">' + esc(s.description || '') + '</div>' +
      '</div>' +
      '<div class="col-stars">★ ' + fmtStars(s.stars) + '</div>' +
      '<div class="col-forks">⇣ ' + fmtStars(s.forks) + '</div>' +
      '<div class="col-growth">' + daily + '</div>' +
      '<div class="col-rank">›</div>' +
    '</a>';
  });

  document.getElementById('tableContainer').innerHTML = html;
  document.getElementById('resultCount').innerHTML = '<strong>' + filtered.length + '</strong> ' + t('results');
  renderPagination();
}

function renderPagination() {
  var total = Math.ceil(filtered.length / perPage);
  if (total <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  var html = '';
  html += '<button class="pg-btn" ' + (page === 1 ? 'disabled' : '') + ' onclick="goPage(' + (page - 1) + ')">' + t('prev') + '</button>';
  var start = Math.max(1, page - 2);
  var end = Math.min(total, start + 4);
  if (end - start < 4) start = Math.max(1, end - 4);
  for (var i = start; i <= end; i++) {
    html += '<button class="pg-btn ' + (i === page ? 'active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
  }
  html += '<button class="pg-btn" ' + (page === total ? 'disabled' : '') + ' onclick="goPage(' + (page + 1) + ')">' + t('next') + '</button>';
  html += '<span class="pg-info">' + page + ' / ' + total + '</span>';
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) {
  var total = Math.ceil(filtered.length / perPage);
  if (p < 1 || p > total) return;
  page = p;
  renderTable();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function switchTab(type) {
  currentTab = type;
  document.querySelectorAll('.trend-tab').forEach(function(t2) { t2.classList.remove('active'); });
  document.querySelector('.trend-tab[data-type="' + type + '"]').classList.add('active');
  applyFilters();
}

function init() {
  applyI18n();

  fetch('data/skills.json')
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data) {
      DATA = data;
      currentRankings.stars = data.mostStarred;
      currentRankings.downloads = data.mostDownloaded;
      currentRankings.rising = data.risingFast;
      document.getElementById('totalCount').textContent = data.stats.totalSkills.toLocaleString();
      renderFilters();
      // 初始化筛选
      var initialCat = getParam('cat');
      var initialQ = getParam('q');
      if (initialCat) document.getElementById('catFilter').value = initialCat;
      if (initialQ) document.getElementById('searchInput').value = initialQ;
      applyFilters();
    })
    .catch(function(err) {
      console.error(err);
      document.getElementById('tableContainer').innerHTML = '<div class="error-state"><p>' + t('loadFailed') + '</p><p class="error-msg">' + esc(err.message) + '</p></div>';
    });

  // 事件
  document.getElementById('searchInput').addEventListener('input', applyFilters);
  document.getElementById('catFilter').addEventListener('change', applyFilters);
  document.getElementById('langFilter').addEventListener('change', applyFilters);
  document.querySelectorAll('.trend-tab').forEach(function(tab) {
    tab.addEventListener('click', function() { switchTab(tab.getAttribute('data-type')); });
  });
}

init();
</script>
</body>
</html>
