<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking — SkillTrends</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0d1117; --bg-surface: #161b22; --bg-surface-2: #1c2128;
  --border: #30363d; --border-light: #484f58;
  --text-primary: #f0f6fc; --text-secondary: #8b949e; --text-muted: #6e7681;
  --accent-blue: #58a6ff; --accent-gold: #e3b341; --accent-orange: #f78166;
  --accent-green: #3fb950; --accent-red: #f85149; --accent-purple: #a371f7;
  --font-mono: 'Consolas', 'Courier New', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

body {
  font-family: var(--font-sans); background: var(--bg-primary);
  color: var(--text-primary); min-height: 100vh; line-height: 1.5;
}

/* Nav */
.top-nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(22,27,34,0.95); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px;
  display: flex; align-items: center; gap: 24px;
}
.nav-logo {
  font-size: 20px; font-weight: 700; text-decoration: none; display: flex; align-items: center; gap: 8px;
  color: var(--text-primary);
}
.nav-logo svg { width: 28px; height: 28px; }
.nav-links { display: flex; gap: 4px; margin-left: auto; }
.nav-link {
  padding: 6px 14px; border-radius: 6px; font-size: 14px; font-weight: 500;
  color: var(--text-secondary); text-decoration: none; transition: all 0.2s;
}
.nav-link:hover { color: var(--text-primary); background: var(--bg-surface-2); }
.nav-link.active { color: var(--accent-blue); background: rgba(88,166,255,0.1); }

/* Container */
.container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

/* Page Header */
.page-header { padding: 40px 0 24px; }
.page-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.page-header p { color: var(--text-secondary); font-size: 14px; }

/* Search + Filters Bar */
.filter-bar {
  display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;
}
.search-box {
  position: relative; flex: 1; min-width: 250px; max-width: 400px;
}
.search-box input {
  width: 100%; height: 40px; padding: 0 14px 0 38px;
  border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg-surface); color: var(--text-primary);
  font-size: 14px; outline: none; transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--accent-blue); }
.search-box svg { position: absolute; left: 12px; top: 12px; }
.filter-select {
  height: 40px; padding: 0 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg-surface); color: var(--text-primary);
  font-size: 13px; cursor: pointer; outline: none; min-width: 140px;
}
.filter-select:focus { border-color: var(--accent-blue); }
.result-count { font-size: 13px; color: var(--text-muted); margin-left: auto; white-space: nowrap; }

/* Tabs */
.rank-tabs { display: flex; gap: 4px; margin-bottom: 20px; }
.rank-tab {
  padding: 8px 24px; border-radius: 8px; font-size: 14px; font-weight: 500;
  color: var(--text-secondary); background: transparent; border: none; cursor: pointer;
  transition: all 0.2s;
}
.rank-tab:hover { color: var(--text-primary); background: var(--bg-surface); }
.rank-tab.active { color: var(--text-primary); background: var(--bg-surface-2); }
.rank-tab.stars.active { color: var(--accent-gold); background: rgba(227,179,65,0.1); }
.rank-tab.downloads.active { color: var(--accent-blue); background: rgba(88,166,255,0.1); }
.rank-tab.rising.active { color: var(--accent-orange); background: rgba(247,129,102,0.1); }

/* Table */
.skills-table {
  width: 100%; border-collapse: separate; border-spacing: 0 6px;
}
.skills-table th {
  text-align: left; padding: 8px 14px; font-size: 12px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
}
.skills-table td { padding: 14px; }
.skills-table tr.skill-row {
  background: var(--bg-surface); border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
}
.skills-table tr.skill-row:hover {
  background: var(--bg-surface-2); transform: translateX(2px);
}
.skills-table tr.skill-row td:first-child { border-radius: 8px 0 0 8px; }
.skills-table tr.skill-row td:last-child { border-radius: 0 8px 8px 0; }
.rank-num { font-size: 16px; font-weight: 700; font-family: var(--font-mono); color: var(--text-muted); width: 40px; text-align: center; }
.repo-info { display: flex; align-items: center; gap: 12px; }
.repo-name { font-size: 14px; font-weight: 600; }
.repo-name a { color: var(--accent-blue); text-decoration: none; }
.repo-name a:hover { text-decoration: underline; }
.repo-author { font-size: 12px; color: var(--text-muted); }
.repo-desc { font-size: 13px; color: var(--text-secondary); max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.stat-cell { font-family: var(--font-mono); font-size: 14px; text-align: right; }
.stat-cell.gold { color: var(--accent-gold); }
.stat-cell.blue { color: var(--accent-blue); }
.stat-cell.green { color: var(--accent-green); }
.tag-cell { display: flex; gap: 4px; flex-wrap: wrap; }
.tag {
  padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
  background: var(--bg-surface-2); color: var(--text-secondary);
}

/* Pagination */
.pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 24px; padding: 20px 0; }
.page-btn {
  padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg-surface); color: var(--text-secondary);
  font-size: 13px; cursor: pointer; transition: all 0.2s;
}
.page-btn:hover:not(:disabled) { border-color: var(--accent-blue); color: var(--accent-blue); }
.page-btn:disabled { opacity: 0.4; cursor: default; }
.page-info { font-size: 13px; color: var(--text-muted); }

/* Loading / Error */
.loading-state, .error-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.error-state .error-msg { color: var(--accent-red); font-size: 13px; margin-top: 6px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.no-results { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.no-results svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.5; }

@media (max-width: 768px) {
  .skills-table { font-size: 12px; }
  .repo-desc { display: none; }
  .tag-cell { display: none; }
  .filter-bar { flex-direction: column; }
}
</style>
</head>
<body>

<nav class="top-nav">
  <a href="index.html" class="nav-logo">
    <svg viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="#58a6ff"/><path d="M8 14l4 4 8-8" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    SkillTrends
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="ranking.html" class="nav-link active">Ranking</a>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Skill Rankings</h1>
    <p>Complete list of Agent Skills on GitHub, ranked and filterable.</p>
  </div>

  <div class="filter-bar">
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search by name, description, topic...">
    </div>
    <select class="filter-select" id="categoryFilter">
      <option value="all">All Categories</option>
    </select>
    <select class="filter-select" id="languageFilter">
      <option value="all">All Languages</option>
    </select>
    <span class="result-count" id="resultCount">— results</span>
  </div>

  <div class="rank-tabs">
    <button class="rank-tab stars active">Most Starred</button>
    <button class="rank-tab downloads">Most Downloaded</button>
    <button class="rank-tab rising">Rising Fast</button>
  </div>

  <div id="tableContainer">
    <div class="loading-state"><div class="spinner"></div><p>Loading rankings...</p></div>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<script>
var SKILLS_DATA = null;
var currentRanking = 'stars';
var currentPage = 1;
var pageSize = 20;
var searchQuery = '';
var catFilter = 'all';
var langFilter = 'all';
var filteredData = [];

// ===== UTILS =====
function fmtStars(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return String(n);
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== PARSE URL PARAMS =====
function getParam(name) {
  var params = new URLSearchParams(window.location.search);
  return params.get(name);
}

// ===== FILTER =====
function applyFilters() {
  var data = [];
  if (currentRanking === 'stars') data = SKILLS_DATA.mostStarred;
  else if (currentRanking === 'downloads') data = SKILLS_DATA.mostDownloaded;
  else data = SKILLS_DATA.risingFast;

  filteredData = data.filter(function(s) {
    if (catFilter !== 'all' && s.category !== catFilter) return false;
    if (langFilter !== 'all' && s.language !== langFilter) return false;
    if (searchQuery) {
      var q = searchQuery.toLowerCase();
      var matchName = s.fullName.toLowerCase().indexOf(q) >= 0;
      var matchDesc = s.description && s.description.toLowerCase().indexOf(q) >= 0;
      var matchTopics = s.topics && s.topics.some(function(t) { return t.toLowerCase().indexOf(q) >= 0; });
      var matchLang = s.language && s.language.toLowerCase().indexOf(q) >= 0;
      if (!matchName && !matchDesc && !matchTopics && !matchLang) return false;
    }
    return true;
  });

  document.getElementById('resultCount').textContent = filteredData.length.toLocaleString() + ' results';
  currentPage = 1;
  renderTable();
  renderPagination();
}

// ===== RENDER TABLE =====
function renderTable() {
  var container = document.getElementById('tableContainer');
  var start = (currentPage - 1) * pageSize;
  var page = filteredData.slice(start, start + pageSize);

  if (page.length === 0) {
    container.innerHTML = '<div class="no-results"><svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>No skills match your search criteria.</p></div>';
    return;
  }

  var html = '<table class="skills-table"><thead><tr>' +
    '<th>#</th><th>Repository</th><th>Description</th><th>Stars</th><th>Forks</th><th>Growth</th><th>Tags</th>' +
    '</tr></thead><tbody>';

  for (var i = 0; i < page.length; i++) {
    var s = page[i];
    var rank = start + i + 1;
    var author = s.fullName.split('/')[0];
    var growth = s.starsPerDay ? '+' + fmtStars(s.starsPerDay) + '/day' : '—';
    var tags = (s.topics || []).concat(s.category ? [s.category] : []).slice(0, 3);
    var detailUrl = 'detail.html?id=' + encodeURIComponent(s.fullName);

    html += '<tr class="skill-row" onclick="window.location.href=\'' + detailUrl + '\'">' +
      '<td class="rank-num">' + rank + '</td>' +
      '<td>' +
        '<div class="repo-info">' +
          '<div><div class="repo-name"><a href="' + detailUrl + '" onclick="event.stopPropagation()">' + esc(s.fullName) + '</a></div>' +
          '<div class="repo-author">@' + esc(author) + (s.language ? ' · ' + esc(s.language) : '') + '</div></div>' +
        '</div>' +
      '</td>' +
      '<td class="repo-desc">' + esc(s.description) + '</td>' +
      '<td class="stat-cell gold">' + fmtStars(s.stars) + '</td>' +
      '<td class="stat-cell blue">' + fmtStars(s.forks) + '</td>' +
      '<td class="stat-cell green">' + growth + '</td>' +
      '<td class="tag-cell">' + tags.map(function(t) { return '<span class="tag">' + esc(t) + '</span>'; }).join('') + '</td>' +
    '</tr>';
  }

  html += '</tbody></table>';
  container.innerHTML = html;
}

// ===== PAGINATION =====
function renderPagination() {
  var total = Math.ceil(filteredData.length / pageSize);
  var el = document.getElementById('pagination');
  if (total <= 1) { el.innerHTML = ''; return; }

  var html = '<button class="page-btn" onclick="goPage(' + (currentPage - 1) + ')" ' + (currentPage <= 1 ? 'disabled' : '') + '>← Prev</button>';
  html += '<span class="page-info">Page ' + currentPage + ' / ' + total + '</span>';
  html += '<button class="page-btn" onclick="goPage(' + (currentPage + 1) + ')" ' + (currentPage >= total ? 'disabled' : '') + '>Next →</button>';
  el.innerHTML = html;
}

function goPage(n) {
  var total = Math.ceil(filteredData.length / pageSize);
  if (n < 1 || n > total) return;
  currentPage = n;
  renderTable();
  renderPagination();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== POPULATE FILTERS =====
function populateFilters() {
  var cats = new Set(), langs = new Set();
  SKILLS_DATA.allSkills.forEach(function(s) {
    if (s.category) cats.add(s.category);
    if (s.language) langs.add(s.language);
  });

  var catSel = document.getElementById('categoryFilter');
  Array.from(cats).sort().forEach(function(c) {
    catSel.innerHTML += '<option value="' + esc(c) + '">' + esc(c) + '</option>';
  });

  var langSel = document.getElementById('languageFilter');
  Array.from(langs).sort().forEach(function(l) {
    langSel.innerHTML += '<option value="' + esc(l) + '">' + esc(l) + '</option>';
  });
}

// ===== INIT =====
function init() {
  fetch('data/skills.json')
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data) {
      SKILLS_DATA = data;
      console.log('Loaded: ' + data.stats.totalSkills + ' skills');

      populateFilters();

      // Apply URL params
      var q = getParam('q');
      var cat = getParam('cat');
      if (q) { document.getElementById('searchInput').value = q; searchQuery = q; }
      if (cat) { document.getElementById('categoryFilter').value = cat; catFilter = cat; }

      applyFilters();

      // Tabs
      var tabs = document.querySelectorAll('.rank-tab');
      for (var i = 0; i < tabs.length; i++) {
        tabs[i].addEventListener('click', function() {
          for (var j = 0; j < tabs.length; j++) tabs[j].classList.remove('active');
          this.classList.add('active');
          if (this.classList.contains('stars')) currentRanking = 'stars';
          else if (this.classList.contains('downloads')) currentRanking = 'downloads';
          else currentRanking = 'rising';
          applyFilters();
        });
      }

      // Search input
      var searchInp = document.getElementById('searchInput');
      var debounceTimer;
      searchInp.addEventListener('input', function() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(function() {
          searchQuery = searchInp.value.trim();
          applyFilters();
        }, 300);
      });

      // Filters
      document.getElementById('categoryFilter').addEventListener('change', function() {
        catFilter = this.value; applyFilters();
      });
      document.getElementById('languageFilter').addEventListener('change', function() {
        langFilter = this.value; applyFilters();
      });
    })
    .catch(function(err) {
      console.error('Failed to load:', err);
      document.getElementById('tableContainer').innerHTML = '<div class="error-state"><p>Failed to load data</p><p class="error-msg">' + esc(err.message) + '</p></div>';
    });
}

init();
</script>
</body>
</html>
