<!DOCTYPE html>
<html lang="zh-CN" data-lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="detailTitle">技能详情 — SkillTrends</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0d1117; --bg-surface: #161b22; --bg-surface-2: #1c2128;
  --border: #30363d; --border-light: #484f58;
  --text-primary: #f0f6fc; --text-secondary: #8b949e; --text-muted: #6e7681;
  --accent-blue: #58a6ff; --accent-gold: #e3b341; --accent-orange: #f78166;
  --accent-green: #3fb950; --accent-red: #f85149; --accent-purple: #a371f7;
  --font-mono: 'Consolas', 'Courier New', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

body {
  font-family: var(--font-sans); background: var(--bg-primary);
  color: var(--text-primary); min-height: 100vh; line-height: 1.5;
}

/* Nav */
.top-nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(22,27,34,0.95); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px;
  display: flex; align-items: center; gap: 24px;
}
.nav-logo {
  font-size: 20px; font-weight: 700; text-decoration: none; display: flex; align-items: center; gap: 8px;
  color: var(--text-primary);
}
.nav-logo svg { width: 28px; height: 28px; }
.nav-links { display: flex; gap: 4px; margin-left: auto; align-items: center; }
.nav-link {
  padding: 6px 14px; border-radius: 6px; font-size: 14px; font-weight: 500;
  color: var(--text-secondary); text-decoration: none; transition: all 0.2s;
}
.nav-link:hover, .nav-link.active { color: var(--text-primary); background: var(--bg-surface-2); }

/* Language switcher */
.lang-switch { display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-left: 8px; }
.lang-btn {
  padding: 5px 10px; font-size: 12px; font-weight: 600; cursor: pointer;
  background: transparent; color: var(--text-secondary); border: none;
  font-family: var(--font-sans); transition: all 0.15s;
}
.lang-btn:hover { color: var(--text-primary); }
.lang-btn.active { background: var(--accent-blue); color: #fff; }
.lang-btn + .lang-btn { border-left: 1px solid var(--border); }

/* Container */
.container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

/* Breadcrumb */
.breadcrumb { padding: 24px 0 0; font-size: 13px; color: var(--text-muted); }
.breadcrumb a { color: var(--accent-blue); text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }

/* Repo Header */
.repo-header {
  display: flex; align-items: flex-start; gap: 20px; padding: 24px 0 32px;
  border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.repo-avatar {
  width: 64px; height: 64px; border-radius: 12px;
  background: linear-gradient(135deg, #58a6ff, #a371f7);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.repo-info-main { flex: 1; min-width: 0; }
.repo-title { font-size: 28px; font-weight: 700; margin-bottom: 4px; word-break: break-all; }
.repo-title a { color: var(--accent-blue); text-decoration: none; }
.repo-title a:hover { text-decoration: underline; }
.repo-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
.repo-desc-full { font-size: 15px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 12px; }
.repo-topics { display: flex; gap: 6px; flex-wrap: wrap; }
.topic-tag {
  padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
  background: rgba(88,166,255,0.1); color: var(--accent-blue);
}
.gh-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px;
  border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg-surface); color: var(--text-primary);
  font-size: 14px; font-weight: 500; text-decoration: none;
  transition: all 0.2s; flex-shrink: 0;
}
.gh-btn:hover { border-color: var(--accent-blue); }
.gh-btn svg { width: 18px; height: 18px; }

/* Metrics Grid */
.metrics-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px;
  padding: 32px 0;
}
.metric-card {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 20px;
}
.metric-card-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.metric-card-value { font-size: 24px; font-weight: 700; font-family: var(--font-mono); }
.metric-card-value.gold { color: var(--accent-gold); }
.metric-card-value.blue { color: var(--accent-blue); }
.metric-card-value.green { color: var(--accent-green); }
.metric-card-value.orange { color: var(--accent-orange); }
.metric-card-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

/* Chart */
.chart-section { padding: 0 0 32px; }
.chart-wrapper { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; }
.chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
.chart-header h3 { font-size: 16px; }
.chart-legend { display: flex; gap: 16px; }
.chart-legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
.chart-legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.chart-canvas-wrap { width: 100%; height: 280px; position: relative; }
.chart-canvas-wrap canvas { width: 100%; height: 100%; display: block; }

/* Similar / Related */
.similar-section { padding: 0 0 48px; }
.section-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
.similar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.similar-card {
  display: block; text-decoration: none; color: inherit;
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; transition: all 0.2s;
}
.similar-card:hover { transform: translateY(-2px); border-color: var(--accent-blue); }
.similar-card-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.similar-card-desc {
  font-size: 12px; color: var(--text-secondary);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  margin-bottom: 8px;
}
.similar-card-stats { display: flex; gap: 12px; font-size: 12px; font-family: var(--font-mono); color: var(--text-muted); }

/* Loading / Error */
.loading-state, .error-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
.error-state .error-msg { color: var(--accent-red); font-size: 13px; margin-top: 6px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

footer { border-top: 1px solid var(--border); padding: 20px 24px; text-align: center; color: var(--text-muted); font-size: 13px; }

@media (max-width: 600px) {
  .repo-title { font-size: 20px; }
  .repo-header { flex-direction: column; }
  .lang-switch { margin-left: 4px; }
}
</style>
</head>
<body>

<nav class="top-nav">
  <a href="index.html" class="nav-logo">
    <svg viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="#58a6ff"/><path d="M8 14l4 4 8-8" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    SkillTrends
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link" data-i18n="navHome">首页</a>
    <a href="ranking.html" class="nav-link" data-i18n="navRanking">排行榜</a>
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="zh" onclick="setLang('zh')">中</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</nav>

<div class="container">
  <div class="breadcrumb"><a href="index.html" data-i18n="navHome">首页</a> / <a href="ranking.html" data-i18n="navRanking">排行榜</a> / <span id="breadcrumbRepo">...</span></div>

  <div id="content">
    <div class="loading-state"><div class="spinner"></div><p data-i18n="loading">加载中...</p></div>
  </div>
</div>

<footer data-i18n="footer">SkillTrends &copy; 2026 · 数据来源 GitHub API</footer>

<script>
// ============================================================
// i18n — 双语系统
// ============================================================
var I18N = {
  zh: {
    detailTitle: '技能详情 — SkillTrends',
    navHome: '首页', navRanking: '排行榜',
    loading: '加载中...',
    notFound: '技能未找到',
    notFoundSub: '可能已被移除或数据正在刷新。',
    loadFailed: '加载数据失败',
    repoAge: '仓库存在', daysSub: '创建天数',
    license: '许可证',
    similarTitle: '相关推荐',
    stars: 'Stars', forks: 'Forks', growth: '增长率', age: '仓库年龄',
    sPerDay: 'Stars/天', language: '语言', viewOnGH: '在 GitHub 查看',
    chartTitle: 'Stars 增长趋势（30 天模拟）',
    chartLegend1: 'Stars 总量', chartLegend2: '增长趋势',
    footer: 'SkillTrends © 2026 · 数据来源 GitHub API',
    metricStars: 'Stars', metricStarsSub: 'GitHub 星数',
    metricForks: 'Forks', metricForksSub: '仓库复刻',
    metricGrowth: '增长率', metricGrowthSub: '每日新增 Stars',
    metricAge: '仓库年龄', metricAgeSub: '创建至今',
    metricSday: 'Stars / 天', metricSdaySub: '日均 Stars',
    metricLang: '语言', metricLangSub: '主要语言',
  },
  en: {
    detailTitle: 'Skill Detail — SkillTrends',
    navHome: 'Home', navRanking: 'Ranking',
    loading: 'Loading...',
    notFound: 'Skill not found',
    notFoundSub: 'It may have been removed or the data is being refreshed.',
    loadFailed: 'Failed to load data',
    repoAge: 'Days since creation',
    license: 'License',
    similarTitle: 'Similar Skills',
    stars: 'Stars', forks: 'Forks', growth: 'Growth Rate', age: 'Repo Age',
    sPerDay: 'Stars / Day', language: 'Language', viewOnGH: 'View on GitHub',
    chartTitle: 'Stars Growth (30-day simulation)',
    chartLegend1: 'Stars', chartLegend2: 'Growth Trend',
    footer: 'SkillTrends © 2026 · Data from GitHub API',
    metricStars: 'Stars', metricStarsSub: 'GitHub stars',
    metricForks: 'Forks', metricForksSub: 'Repository forks',
    metricGrowth: 'Growth Rate', metricGrowthSub: 'Stars per day',
    metricAge: 'Repo Age', metricAgeSub: 'Days since creation',
    metricSday: 'Stars / Day', metricSdaySub: 'Average daily stars',
    metricLang: 'Language', metricLangSub: 'Primary language',
  }
};

var currentLang = localStorage.getItem('skilltrends_lang') || 'zh';

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('skilltrends_lang', lang);
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  document.documentElement.setAttribute('data-lang', lang);
  document.querySelectorAll('.lang-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-lang') === lang);
  });
  applyI18n();
  // 重新渲染当前技能页面
  if (currentSkill) renderAll(currentSkill);
}

function applyI18n() {
  var dict = I18N[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.getAttribute('data-i18n');
    if (dict[key]) el.textContent = dict[key];
  });
  document.title = dict.detailTitle;
  // 当前页面 nav 链接 active
  var path = location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.nav-link').forEach(function(a) {
    var href = a.getAttribute('href');
    a.classList.toggle('active', href === path);
  });
}

var t = function(key) { return I18N[currentLang][key] || key; };

// ============================================================
// 数据与工具
// ============================================================
var SKILLS_DATA = null;
var currentSkill = null;

function fmtStars(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return String(n);
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function renderAll(skill) {
  document.title = esc(skill.fullName) + ' — SkillTrends';
  document.getElementById('breadcrumbRepo').textContent = skill.fullName.split('/')[1] || skill.fullName;

  var author = skill.fullName.split('/')[0];
  var initial = (author[0] || 's').toUpperCase();
  var growth = skill.starsPerDay ? '+' + fmtStars(skill.starsPerDay) + '/day' : '—';
  var topics = (skill.topics || []).slice(0, 6);

  var html = '';

  // Repo header
  html += '<div class="repo-header">' +
    '<div class="repo-avatar">' + esc(initial) + '</div>' +
    '<div class="repo-info-main">' +
      '<div class="repo-title"><a href="' + esc(skill.url) + '" target="_blank">' + esc(skill.fullName) + '</a></div>' +
      '<div class="repo-sub">@' + esc(author) + ' · ' + esc(skill.language || 'Unknown') + ' · ' + esc(skill.category || 'Other') + ' · ' + t('license') + ': ' + esc(skill.license || 'N/A') + '</div>' +
      '<div class="repo-desc-full">' + esc(skill.description) + '</div>' +
      '<div class="repo-topics">' + topics.map(function(t2) { return '<span class="topic-tag">' + esc(t2) + '</span>'; }).join('') + '</div>' +
    '</div>' +
    '<a href="' + esc(skill.url) + '" target="_blank" class="gh-btn">' +
      '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>' +
      t('viewOnGH') +
    '</a>' +
  '</div>';

  // Metrics
  html += '<div class="metrics-grid">' +
    '<div class="metric-card"><div class="metric-card-label">' + t('metricStars') + '</div><div class="metric-card-value gold">' + fmtStars(skill.stars) + '</div><div class="metric-card-sub">' + t('metricStarsSub') + '</div></div>' +
    '<div class="metric-card"><div class="metric-card-label">' + t('metricForks') + '</div><div class="metric-card-value blue">' + fmtStars(skill.forks) + '</div><div class="metric-card-sub">' + t('metricForksSub') + '</div></div>' +
    '<div class="metric-card"><div class="metric-card-label">' + t('metricGrowth') + '</div><div class="metric-card-value green">' + growth + '</div><div class="metric-card-sub">' + t('metricGrowthSub') + '</div></div>' +
    '<div class="metric-card"><div class="metric-card-label">' + t('metricAge') + '</div><div class="metric-card-value orange">' + (skill.ageDays || '—') + 'd</div><div class="metric-card-sub">' + t('metricAgeSub') + '</div></div>' +
    '<div class="metric-card"><div class="metric-card-label">' + t('metricSday') + '</div><div class="metric-card-value" style="color:var(--accent-purple)">' + (skill.starsPerDay ? fmtStars(skill.starsPerDay) : '—') + '</div><div class="metric-card-sub">' + t('metricSdaySub') + '</div></div>' +
    '<div class="metric-card"><div class="metric-card-label">' + t('metricLang') + '</div><div class="metric-card-value" style="color:var(--text-primary);font-size:20px;">' + esc(skill.language || 'N/A') + '</div><div class="metric-card-sub">' + t('metricLangSub') + '</div></div>' +
  '</div>';

  // Chart
  html += '<div class="chart-section"><div class="chart-wrapper">' +
    '<div class="chart-header">' +
      '<h3>' + t('chartTitle') + '</h3>' +
      '<div class="chart-legend">' +
        '<div class="chart-legend-item"><div class="chart-legend-dot" style="background:#e3b341;"></div>' + t('chartLegend1') + '</div>' +
        '<div class="chart-legend-item"><div class="chart-legend-dot" style="background:#a371f7;"></div>' + t('chartLegend2') + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="chart-canvas-wrap"><canvas id="detailChart"></canvas></div>' +
  '</div></div>';

  // Similar
  var similar = findSimilar(skill);
  if (similar.length > 0) {
    html += '<div class="similar-section"><h3 class="section-title">' + t('similarTitle') + '</h3><div class="similar-grid">';
    similar.forEach(function(s) {
      html += '<a href="detail.html?id=' + encodeURIComponent(s.fullName) + '" class="similar-card">' +
        '<div class="similar-card-name">' + esc(s.fullName) + '</div>' +
        '<div class="similar-card-desc">' + esc(s.description) + '</div>' +
        '<div class="similar-card-stats">' +
          '<span>☆ ' + fmtStars(s.stars) + '</span>' +
          '<span>⇣ ' + fmtStars(s.forks) + '</span>' +
          '<span>' + esc(s.language || '—') + '</span>' +
        '</div>' +
      '</a>';
    });
    html += '</div></div>';
  }

  document.getElementById('content').innerHTML = html;

  // Draw chart after DOM update
  setTimeout(function() { drawDetailChart(skill); }, 80);
  applyI18n();
}

function findSimilar(skill) {
  return SKILLS_DATA.allSkills.filter(function(s) {
    if (s.fullName === skill.fullName) return false;
    if (s.category === skill.category) return true;
    if (s.language === skill.language && skill.language) return true;
    if (s.topics && skill.topics && s.topics.some(function(t2) { return skill.topics.indexOf(t2) >= 0; })) return true;
    return false;
  }).sort(function(a, b) { return b.stars - a.stars; }).slice(0, 6);
}

// ============================================================
// Canvas 图表 — 修复版：纯逻辑像素，不做 DPR 缩放
// ============================================================
function drawDetailChart(skill) {
  var canvas = document.getElementById('detailChart');
  if (!canvas) return;
  var wrap = canvas.parentElement;
  var W = wrap.clientWidth;
  var H = wrap.clientHeight || 280;
  if (W < 50) W = 800; // 兜底

  // 关键修复：使用 attribute 尺寸 + CSS 尺寸，保持 1:1 逻辑像素
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';

  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  // Simulate 30-day star growth
  var perDay = skill.starsPerDay || 10;
  var current = skill.stars;
  var startVal = Math.max(0, current - perDay * 30 * 0.7);
  var growthData = [];
  for (var i = 0; i < 30; i++) {
    var ratio = i / 29;
    var expected = startVal + (current - startVal) * ratio * ratio * (3 - 2 * ratio);
    var noise = 0.95 + Math.random() * 0.1;
    growthData.push(Math.round(expected * noise));
  }
  growthData[29] = current;

  var trendData = [];
  var base = 0;
  for (var ti = 0; ti < 30; ti++) {
    base += perDay / 30 * (0.7 + Math.random() * 0.6);
    trendData.push(Math.round(base));
  }

  var pad = { top: 20, right: 30, bottom: 30, left: 70 };
  var pw = W - pad.left - pad.right;
  var ph = H - pad.top - pad.bottom;

  // Background
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  var gMin = Math.min.apply(null, growthData);
  var gMax = Math.max.apply(null, growthData);
  var gRange = (gMax - gMin) || 1;
  var tMax = Math.max.apply(null, trendData);
  var tRange = tMax || 1;

  function toGx(i) { return pad.left + (pw / 29) * i; }
  function toGy(v) { return pad.top + ph - ((v - gMin) / gRange) * ph; }
  function toTy(v) { return pad.top + ph - (v / tRange) * ph; }

  // Grid + Y-axis labels
  ctx.strokeStyle = 'rgba(48,54,63,0.5)';
  ctx.lineWidth = 1;
  ctx.fillStyle = '#6e7681';
  ctx.font = '11px ' + getComputedStyle(document.body).fontFamily;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (var l = 0; l <= 4; l++) {
    var ly = pad.top + (ph / 4) * l;
    ctx.beginPath();
    ctx.moveTo(pad.left, ly);
    ctx.lineTo(W - pad.right, ly);
    ctx.stroke();
    var val = gMin + (gRange / 4) * l;
    ctx.fillText(fmtStars(Math.round(val)), pad.left - 8, ly);
  }
  ctx.textBaseline = 'alphabetic';

  // Area (Stars)
  var grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ph);
  grad.addColorStop(0, 'rgba(227,179,65,0.30)');
  grad.addColorStop(1, 'rgba(227,179,65,0.01)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top + ph);
  for (var ai = 0; ai < growthData.length; ai++) {
    ctx.lineTo(toGx(ai), toGy(growthData[ai]));
  }
  ctx.lineTo(W - pad.right, pad.top + ph);
  ctx.closePath();
  ctx.fill();

  // Stars line
  ctx.strokeStyle = '#e3b341';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.beginPath();
  for (var si = 0; si < growthData.length; si++) {
    var sx = toGx(si);
    var sy = toGy(growthData[si]);
    if (si === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
  }
  ctx.stroke();

  // Trend dashed line
  ctx.strokeStyle = '#a371f7';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  for (var ni = 0; ni < trendData.length; ni++) {
    var nx = toGx(ni);
    var ny = toTy(trendData[ni]);
    if (ni === 0) ctx.moveTo(nx, ny); else ctx.lineTo(nx, ny);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // X-axis day labels
  ctx.fillStyle = '#6e7681';
  ctx.font = '10px ' + getComputedStyle(document.body).fontFamily;
  ctx.textAlign = 'center';
  for (var xi = 0; xi < 30; xi += 5) {
    ctx.fillText('D' + (xi + 1), toGx(xi), H - 8);
  }
}

// ============================================================
// INIT
// ============================================================
function init() {
  applyI18n();
  var id = getParam('id');
  if (!id) {
    document.getElementById('content').innerHTML = '<div class="error-state"><p>' + t('notFound') + '</p></div>';
    return;
  }

  fetch('data/skills.json')
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data) {
      SKILLS_DATA = data;
      var decodedId = decodeURIComponent(id);
      currentSkill = data.allSkills.find(function(s) { return s.fullName === decodedId; });

      if (!currentSkill) {
        document.getElementById('content').innerHTML = '<div class="error-state"><p>' + t('notFound') + ': <strong>' + esc(decodedId) + '</strong></p><p style="margin-top:8px;font-size:13px;">' + t('notFoundSub') + '</p></div>';
        return;
      }

      console.log('Rendering:', currentSkill.fullName);
      renderAll(currentSkill);
    })
    .catch(function(err) {
      console.error('Failed to load:', err);
      document.getElementById('content').innerHTML = '<div class="error-state"><p>' + t('loadFailed') + '</p><p class="error-msg">' + esc(err.message) + '</p></div>';
    });
}

window.addEventListener('resize', function() {
  if (currentSkill) drawDetailChart(currentSkill);
});

init();
</script>
